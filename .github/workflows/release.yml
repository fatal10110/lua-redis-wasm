name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build WASM (Docker)
        run: ./wasm/build/docker-build.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm ci

      - name: Build package (ts + bundle wasm into dist)
        run: |
          npm run build:ts
          node ./scripts/copy-wasm.mjs

      - name: Tests
        run: npm run test:skip-wasm

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      # dist/ is already built above; --ignore-scripts skips the prepublishOnly
      # rebuild (which would run the docker WASM build again).
      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
